[mcu eddy]
serial: /dev/serial/by-id/usb-Eddy_rp2040_5044340310A9D51C-if00
restart_method: command

[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 10
max_temp: 100

[probe_eddy_ng btt_eddy]
sensor_type: btt_eddy
i2c_mcu: eddy
i2c_bus: i2c0f
samples_per_second: 800
scan_sample_time: 0.030
reg_drive_current: 15
tap_drive_current: 16
x_offset: -18.0
y_offset: 6.0 
# a bit lower than default, due to calibration
tap_start_z: 2.9
tap_target_z: -0.450
tap_adjust_z: 0.030
tap_samples: 4
tap_max_samples: 10
tap_samples_stddev: 0.010
write_tap_plot: true
write_every_tap_plot: true
# these are defaults
tap_mode: butter
tap_threshold: 250
tap_butter_order: 2
tap_butter_lowcut: 5
tap_butter_highcut: 25

[temperature_sensor btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26
