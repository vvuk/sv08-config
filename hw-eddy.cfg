[probe_eddy_ng mellow_fly]
sensor_type: mellow_fly
i2c_mcu: toolhead
i2c_bus: i2c1e
i2c_address: 43
samples_per_second: 500
scan_sample_time: 0.030
x_offset: 0.0
y_offset: 27.0
tap_target_z: -0.450
tap_adjust_z: 0.025
tap_samples: 4
tap_max_samples: 10
tap_samples_stddev: 0.010
tap_threshold: 250
tap_butter_order: 2
tap_butter_lowcut: 3
tap_butter_highcut: 25
write_tap_plot: true
write_every_tap_plot: true

